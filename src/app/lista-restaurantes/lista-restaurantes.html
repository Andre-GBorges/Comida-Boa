<div class="container mt-4">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h2 class="mb-0">Restaurantes</h2>
    <a routerLink="/adicionar-restaurante" class="btn btn-primary">+ Adicionar restaurante</a>
  </div>

  <div class="row mb-3">
    <div class="col-md-6">
      <input type="text" class="form-control" placeholder="Pesquisar restaurante..."
             [(ngModel)]="termoPesquisa" (input)="buscar()">
    </div>
    <div class="col-md-6">
      <select class="form-select" [(ngModel)]="tipoSelecionado" (change)="buscar()">
        <option value="">Todos os tipos</option>
        <option *ngFor="let tipo of tipos" [value]="tipo">{{ tipo }}</option>
      </select>
    </div>
  </div>

  <p *ngIf="restaurantes.length === 0" class="text-muted">
    Nenhum restaurante encontrado.
  </p>

  <div class="row">
    <div class="col-md-4 mb-3" *ngFor="let restaurante of restaurantes">
      <div class="card h-100 d-flex flex-column">
        <img [src]="restaurante.foto" class="card-img-top" [alt]="restaurante.nome" style="height: 180px; object-fit: cover;">
        <div class="card-body d-flex flex-column">
          <div class="d-flex justify-content-between align-items-start">
            <h5 class="card-title">{{ restaurante.nome }}</h5>
            <span class="badge bg-secondary">{{ restaurante.tipo }}</span>
          </div>
          <p class="card-text text-muted small">{{ restaurante.localizacao }}</p>
          <a [routerLink]="['/restaurante', restaurante.id]" class="btn btn-outline-primary mt-auto">Ver mais</a>
        </div>
      </div>
    </div>
  </div>
</div>
