<div class="container mt-4" *ngIf="restaurante">
  <div class="row">
    <div class="col-md-3 text-center">
      <img [src]="restaurante.foto" class="img-fluid rounded mb-2" [alt]="restaurante.nome">
    </div>
    <div class="col-md-9">
      <h2>{{ restaurante.nome }}</h2>
      <span class="badge bg-secondary mb-2">{{ restaurante.tipo }}</span>
      <p><strong>Localização:</strong> {{ restaurante.localizacao }}</p>
    </div>
  </div>

  <hr>

  <div class="row" *ngIf="restaurante.sobreNos">
    <div class="col-12">
      <h5>Sobre nós</h5>
      <p>{{ restaurante.sobreNos }}</p>
    </div>
  </div>

  

  <hr>

  <div class="d-flex justify-content-between align-items-center mb-2">
    <h5 class="mb-0">Avaliações</h5>
    <a [routerLink]="['/avaliar']" [queryParams]="{restauranteId: restaurante.id}" class="btn btn-outline-primary btn-sm">
      Avaliar
    </a>
  </div>

  <p *ngIf="avaliacoes.length === 0" class="text-muted">
    Esse restaurante ainda não tem avaliações.
  </p>

  <div class="card mb-2" *ngFor="let avaliacao of avaliacoes">
    <div class="card-body">
      <div class="d-flex justify-content-between">
        <h6 class="card-title">{{ avaliacao.nomeUsuario }}</h6>
        <app-estrelas [nota]="avaliacao.nota"></app-estrelas>
      </div>
      <p class="card-text">{{ avaliacao.comentario }}</p>
      <small class="text-muted">{{ avaliacao.data | date:'dd/MM/yyyy' }}</small>
    </div>
  </div>
</div>
