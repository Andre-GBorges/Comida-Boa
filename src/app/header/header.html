<nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm">
  <div class="container-fluid">
    <a class="navbar-brand fw-bold text-success fs-3" routerLink="/">ComidaBoa</a>

    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav ms-auto align-items-center gap-2">

        <li class="nav-item">
           <a class="nav-link nav-pill" routerLink="/">Home</a>

        <li class="nav-item">
          <a class="nav-link nav-pill" routerLink="/avaliar">Avaliar</a>
        </li>

        <li class="nav-item dropdown">
          <a class="nav-link dropdown-toggle btn-descobrir" href="#" role="button"

            <li><a class="dropdown-item" routerLink="/indicacoes">Indicações</a></li>
          </ul>
        </li>

          <li class="nav-item dropdown">
            <a class="nav-link dropdown-toggle avatar-toggle" href="#" role="button"
              data-bs-toggle="dropdown" aria-expanded="false">

              </li>
              <li><hr class="dropdown-divider"></li>
              <li>
                <a class="dropdown-item text-danger" href="#"

              </li>
