<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-5">
      <h2 class="mb-4">Cadastro</h2>

      <div class="alert alert-danger" *ngIf="usuarioJaExiste">
        Já existe um usuário com esse nome. Escolha outro.
      </div>
      <div class="alert alert-danger" *ngIf="erroGeral">
        Ocorreu um erro ao cadastrar. Tente novamente.
      </div>

      <form [formGroup]="form" (ngSubmit)="onSubmit()">
        <div class="mb-3">
          <label class="form-label">Nome de usuário</label>
          <input type="text" class="form-control" formControlName="nome">
          <div class="text-danger" *ngIf="form.get('nome')?.invalid && form.get('nome')?.touched">
            Nome de usuário é obrigatório.
          </div>
        </div>

        <div class="mb-3">
            <label class="form-label">Senha</label>
            <input type="password" class="form-control" formControlName="senha">
            <div class="text-danger" *ngIf="form.get('senha')?.invalid && form.get('senha')?.touched">
                Senha é obrigatória.
            </div>
        </div>

        <div class="mb-3">
          <label class="form-label">Confirmar senha</label>
          <input type="password" class="form-control" formControlName="confirmarSenha">
          <div *ngIf="form.get('confirmarSenha')?.touched">
            <div class="text-danger" *ngIf="form.get('confirmarSenha')?.hasError('required')">
              Confirme sua senha.
            </div>
            <div class="text-danger" *ngIf="!form.get('confirmarSenha')?.hasError('required') && form.hasError('senhasDiferentes')">
              As senhas não coincidem.
            </div>
          </div>
        </div>

        <button type="submit" class="btn btn-primary w-100">Cadastrar</button>
      </form>

      <p class="mt-3">
        Já tem conta? <a routerLink="/login">Entrar</a>
      </p>
    </div>
  </div>
</div>
