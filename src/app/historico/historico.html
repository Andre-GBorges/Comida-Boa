<div class="container mt-4" *ngIf="usuario">
  <h2 class="mb-3">Meu histórico</h2>

  <div class="row mb-3">
    <div class="col-md-6">
      <input type="text" class="form-control" placeholder="Pesquisar pelo nome do restaurante..."
             [(ngModel)]="termoPesquisa" (input)="filtrar()">
    </div>
    <div class="col-md-6">
      <select class="form-select" [(ngModel)]="tipoSelecionado" (change)="filtrar()">
        <option value="">Todos os tipos</option>
        <option *ngFor="let tipo of tipos" [value]="tipo">{{ tipo }}</option>
      </select>
    </div>
  </div>

  <p *ngIf="avaliacoes.length === 0" class="text-muted">
    Você ainda não fez nenhuma avaliação.
  </p>

  <p *ngIf="avaliacoes.length > 0 && avaliacoesFiltradas.length === 0" class="text-muted">
    Nenhuma avaliação encontrada com esse filtro.
  </p>

  <div class="card mb-2" *ngFor="let avaliacao of avaliacoesFiltradas">
    <div class="card-body">
      <div class="d-flex justify-content-between">
        <h6 class="card-title">{{ avaliacao.restauranteNome }}</h6>
        <span class="badge bg-secondary">{{ avaliacao.restauranteTipo }}</span>
      </div>
      <app-estrelas [nota]="avaliacao.nota" class="d-block mb-1"></app-estrelas>
      <p class="card-text">{{ avaliacao.comentario }}</p>
      <small class="text-muted">{{ avaliacao.data | date:'dd/MM/yyyy' }}</small>
    </div>
  </div>
</div>
