<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-5">
      <h2 class="mb-4">Login</h2>

      <div class="alert alert-danger" *ngIf="erroLogin">
        Usuário ou senha incorretos.
      </div>

      <form [formGroup]="form" (ngSubmit)="onSubmit()">
        <div class="mb-3">
          <label class="form-label">Nome de usuário</label>
          <input type="text" class="form-control" formControlName="nome">
          <div class="text-danger" *ngIf="form.get('nome')?.invalid && form.get('nome')?.touched">
            Nome de usuário é obrigatório.
          </div>
        </div>

        <div class="mb-3">
          <label class="form-label">Senha</label>
          <input type="password" class="form-control" formControlName="senha">
          <div class="text-danger" *ngIf="form.get('senha')?.invalid && form.get('senha')?.touched">
            Senha é obrigatória.
          </div>
        </div>

        <button type="submit" class="btn btn-primary w-100">Entrar</button>
      </form>

      <p class="mt-3">
        Não tem conta? <a routerLink="/cadastro">Cadastre-se</a>
      </p>
    </div>
  </div>
</div>
