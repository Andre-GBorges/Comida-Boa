<div class="container mt-4">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h2 class="mb-4 text-center">Restaurantes em destaque</h2>
  </div>

  <p *ngIf="restaurantes.length === 0" class="text-muted">
    Nenhum restaurante cadastrado ainda. Seja o primeiro a adicionar um!
  </p>

  <div class="row">
    <div class="col-md-4 mb-4" *ngFor="let restaurante of restaurantes">
      <div class="card h-100">
        <img [src]="restaurante.foto" class="card-img-top" [alt]="restaurante.nome" style="height: 180px; object-fit: cover;">
        <div class="card-body d-flex flex-column">
          <div class="d-flex justify-content-between align-items-start">
            <h5 class="card-title">{{ restaurante.nome }}</h5>
            <span class="badge bg-secondary">{{ restaurante.tipo }}</span>
          </div>

          <div *ngIf="restaurante.avaliacoesRecentes.length > 0">
            <hr>
            <p class="mb-1"><strong>Avaliações recentes</strong></p>
            <div *ngFor="let avaliacao of restaurante.avaliacoesRecentes" class="mb-2">
              <small>
                <strong>{{ avaliacao.nomeUsuario }}</strong><br>
                <app-estrelas [nota]="avaliacao.nota"></app-estrelas><br>
                {{ avaliacao.comentario }}
              </small>
            </div>
          </div>

          <a [routerLink]="['/restaurante', restaurante.id]" class="btn btn-outline-primary mt-auto">Ver mais</a>
        </div>
      </div>
    </div>
  </div>
</div>
